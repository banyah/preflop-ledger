<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CPG Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#090d12; --bg2:#0f1419; --bg3:#161c24; --bg4:#1c242e;
  --border:#253040; --border2:#304050;
  --text:#bfcdd8; --text2:#6a7f90; --text3:#3a4f60;
  --green:#00d49a; --green2:#009970; --green3:#001a0d;
  --red:#e04858; --red2:#902030; --red3:#1f0a0e;
  --amber:#f0a030; --amber2:#a06010; --amber3:#1f1408;
  --blue:#4090e0; --blue2:#205090; --blue3:#080e1f;
  --purple:#a070e0;
  --mono:'Share Tech Mono',monospace;
  --sans:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;}

/* ── SETUP ── */
#setup{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#setup h1{font-size:28px;font-weight:800;letter-spacing:3px;color:var(--green);margin-bottom:3px;text-transform:uppercase;}
#setup p{font-size:11px;color:var(--text3);letter-spacing:2px;margin-bottom:28px;}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:420px;}
.slabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-weight:700;}
.sgroup{margin-bottom:20px;}
.pill-row{display:flex;gap:7px;}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:15px;font-weight:700;padding:11px 0;cursor:pointer;min-height:46px;flex:1;text-align:center;transition:all .15s;}
.pill.on{background:var(--green);border-color:var(--green);color:#000;}
.pill:active{opacity:.7;}
.setup-hint{font-size:11px;color:var(--text3);text-align:center;letter-spacing:.5px;margin:6px 0 10px;}
.go-btn{background:var(--green);border:none;border-radius:11px;color:#000;font-family:var(--sans);font-size:17px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:15px;width:100%;cursor:pointer;min-height:54px;transition:opacity .15s;}
.go-btn:active{opacity:.7;}

/* ── MAIN ── */
#main{display:none;flex-direction:column;height:100%;}
#main.active{display:flex;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px;}
.topbar-left{flex-shrink:0;min-width:0;}
.topbar-stats{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ts{text-align:center;min-width:30px;}
.ts-l{font-size:7px;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:1px;font-weight:700;}
.ts-v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}
.ts-v.hi{color:var(--green);}
.end-btn{background:none;border:1px solid var(--red2);border-radius:6px;color:var(--red);font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.8px;padding:5px 8px;cursor:pointer;min-height:28px;transition:opacity .15s;flex-shrink:0;margin-left:2px;}
.end-btn:active{opacity:.7;}
.topbar-title{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);}
.topbar-sub{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:1px;}
.add-btn{background:var(--green);border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:13px;font-weight:800;letter-spacing:1px;padding:8px 16px;cursor:pointer;min-height:36px;transition:opacity .15s;}
.add-btn:active{opacity:.7;}
.add-hand-row{padding:10px 10px 16px;display:flex;justify-content:center;}
.add-hand-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;color:var(--text2);font-family:var(--sans);font-size:15px;font-weight:800;letter-spacing:1px;padding:13px 40px;cursor:pointer;min-height:48px;transition:opacity .15s;width:100%;max-width:320px;}
.add-hand-btn:active{opacity:.7;}
.ledger{flex:1;overflow-y:auto;padding:10px 10px 0;-webkit-overflow-scrolling:touch;}

/* ── POSITION ARROWS ── */
.pos-arrow-row{display:flex;align-items:center;background:var(--bg3);border-bottom:1px solid var(--border);min-height:36px;}
.pos-arrow-btn{background:none;border:none;color:var(--text2);font-size:20px;padding:0 16px;cursor:pointer;min-height:40px;min-width:48px;display:flex;align-items:center;justify-content:center;transition:color .12s;flex-shrink:0;}
.pos-arrow-btn:active{color:var(--green);}
.pos-display{flex:1;text-align:center;padding:4px;}
.pos-name-big{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--green);line-height:1;}
.pos-cpg-small{font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:1px;}

/* ── TABLE ── */
.table-section{padding:6px 8px 4px;border-bottom:1px solid var(--border);}
.table-felt-wrap{background:#111111;border-radius:12px;overflow:hidden;border:2px solid #1a3020;}
.table-inner{position:relative;width:100%;}
.felt-svg{width:100%;display:block;position:absolute;inset:0;}
.seat-btn{position:absolute;transform:translate(-50%,-50%);background:var(--bg4);border:2px solid var(--border);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .12s;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.seat-btn:active{opacity:.7;}
.seat-btn .snum{font-family:var(--mono);font-size:9px;color:var(--text3);font-weight:700;line-height:1;letter-spacing:0;}
.seat-btn .sact{font-family:var(--mono);font-size:10px;font-weight:700;line-height:1;margin-top:2px;letter-spacing:0;}
.seat-btn .spos{font-family:var(--mono);font-size:8px;color:var(--green2);line-height:1;margin-top:2px;}
.seat-btn.hero{background:var(--green3);border-color:var(--green);border-width:2px;}
.seat-btn.hero .snum{color:var(--green2);}
.seat-btn.st-limp{background:var(--amber3);border-color:var(--amber);} .seat-btn.st-limp .snum{color:var(--amber);} .seat-btn.st-limp .sact{color:var(--amber);}
.seat-btn.st-raise{background:var(--bg4);border-color:#a0b8c8;} .seat-btn.st-raise .snum{color:#a0b8c8;} .seat-btn.st-raise .sact{color:#a0b8c8;}
.seat-btn.st-call{background:var(--blue3);border-color:var(--blue);} .seat-btn.st-call .snum{color:var(--blue);} .seat-btn.st-call .sact{color:var(--blue);}
.seat-btn.st-fold{background:var(--red3);border-color:var(--red);} .seat-btn.st-fold .snum{color:var(--red);} .seat-btn.st-fold .sact{color:var(--red);}
.seat-btn.st-3bet{background:#100820;border-color:var(--purple);} .seat-btn.st-3bet .snum{color:var(--purple);} .seat-btn.st-3bet .sact{color:var(--purple);}
.seat-btn.st-4bet{background:var(--amber3);border-color:var(--amber);} .seat-btn.st-4bet .snum{color:var(--amber);} .seat-btn.st-4bet .sact{color:var(--amber);}
.seat-btn.st-5bet{background:var(--red3);border-color:var(--red);} .seat-btn.st-5bet .snum{color:var(--red);} .seat-btn.st-5bet .sact{color:var(--red);}
.seat-btn.st-vpip{background:#141a22;border-color:#6a7f90;} .seat-btn.st-vpip .snum{color:#6a7f90;} .seat-btn.st-vpip .sact{color:#8a9faa;}
.dealer-btn{position:absolute;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#ffffff;border:2px solid #cccccc;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
.dealer-btn span{font-family:var(--mono);font-size:7px;font-weight:700;color:#333333;}
.blind-chip{position:absolute;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:5;display:flex;align-items:center;justify-content:center;}
.blind-chip span{font-family:var(--mono);font-size:6px;font-weight:700;}


/* ── HAND MATRIX OVERLAY ── */
#hand-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;flex-direction:column;align-items:center;justify-content:center;}
#hand-overlay.open{display:flex;}
.matrix-wrap{padding:8px;width:100%;max-width:500px;}
.matrix-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;width:100%;touch-action:none;user-select:none;-webkit-user-select:none;}
.mc{border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:none;cursor:pointer;}
.mc.sel{background:var(--green);border-color:var(--green);color:#000;}
.matrix-cancel{background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:14px;font-weight:700;padding:12px 32px;cursor:pointer;margin-top:10px;min-height:48px;touch-action:manipulation;}

/* ── HOLE CARD DISPLAY ── */
.cards-section{padding:8px 12px;border-bottom:1px solid var(--border);}
.csec-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:700;}
.hand-tap-area{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;touch-action:manipulation;}
.hand-tap-area.has-hand{border-color:var(--border2);}
.hand-big{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--green);letter-spacing:3px;}
.hand-prompt{font-size:12px;color:var(--text3);letter-spacing:1px;}
.clear-hand{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:5px 0 0;text-decoration:underline;display:block;text-align:center;}

/* CPG */
.cpg-bar{margin:5px 12px;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:600;line-height:1;}
.cpg-ok{background:var(--green3);border:1px solid var(--green2);color:var(--green);}
.cpg-dev{background:var(--amber3);border:1px solid var(--amber2);color:var(--amber);}

/* Opt */
.opt-row{display:flex;gap:6px;padding:6px 12px;}
.opt-btn{background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--sans);font-size:11px;font-weight:700;padding:7px 12px;cursor:pointer;min-height:36px;letter-spacing:.5px;transition:all .12s;}
.opt-btn.on{border-color:var(--border2);color:var(--text);}
.opt-btn:active{opacity:.7;}
.opt-panel{padding:8px 14px 12px;display:none;}
.opt-panel.open{display:block;}
.opt-input{background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:18px;padding:11px 14px;width:100%;outline:none;transition:border-color .15s;}
.opt-input:focus{border-color:var(--green);}
.notes-ta{background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 14px;width:100%;outline:none;resize:none;min-height:68px;transition:border-color .15s;}
.notes-ta:focus{border-color:var(--green);}

/* ── LOGGED ROWS ── */
.hand-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.hand-row.inc{border-left:3px solid var(--amber2);}
.hand-row.noted{border-right:3px solid var(--blue2);}
.row-summary{display:flex;align-items:center;padding:11px 14px;cursor:pointer;gap:8px;min-height:50px;user-select:none;}
.rnum{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:24px;}
.rpos{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);min-width:38px;}
.rcards{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);min-width:42px;}
.raction{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;flex:1;}
.ract-raise{color:var(--green);} .ract-call,.ract-overlimp{color:var(--blue);} .ract-fold{color:var(--text3);} .ract-3bet{color:var(--purple);} .ract-4bet,.ract-5bet{color:var(--amber);}
.rstack{font-family:var(--mono);font-size:11px;color:var(--text2);min-width:46px;text-align:right;}
.ricons{display:flex;gap:3px;align-items:center;font-size:13px;}
.rts{font-family:var(--mono);font-size:9px;color:var(--text3);padding:0 14px 7px;}
.row-edit{display:none;border-top:1px solid var(--border);background:var(--bg3);}
.row-edit.open{display:block;}
.new-card{background:var(--bg2);border:1px solid var(--green2);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-header{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;}
.card-num{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-weight:700;}

/* ── FOOTER ── */


/* ── EXPORT ── */
#export{display:none;flex-direction:column;height:100%;background:var(--bg);}
.exp-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.exp-top b{color:var(--green);font-size:14px;letter-spacing:1px;}
.back-btn{background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:700;padding:9px 14px;cursor:pointer;min-height:40px;}
.exp-text{flex:1;overflow-y:auto;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.copy-btn{background:var(--green);border:none;border-radius:10px;color:#000;font-family:var(--sans);font-size:16px;font-weight:800;padding:15px;margin:10px 14px 20px;cursor:pointer;min-height:50px;transition:opacity .15s;}
.copy-btn:active{opacity:.7;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>CPG Ledger</h1>
  <p>PREFLOP HAND LOGGER</p>
  <div class="setup-card">
    <div class="sgroup">
      <div class="slabel">Table Size</div>
      <div class="pill-row" id="sz-pills">
        <div class="pill on" data-v="8" onclick="selPill(this,'sz-pills')">8</div>
        <div class="pill" data-v="9" onclick="selPill(this,'sz-pills')">9</div>
      </div>
    </div>
    <div class="sgroup">
      <div class="slabel">Your Seat Number</div>
      <div id="setup-table-wrap" style="width:100%"></div>
      <div class="setup-hint">Tap your physical seat</div>
    </div>
    <button class="go-btn" onclick="startSession()">START SESSION</button>
  </div>
</div>

<!-- HAND MATRIX OVERLAY -->
<div id="hand-overlay">
  <div id="matrix-live-display" style="font-family:'Share Tech Mono',monospace;font-size:44px;font-weight:700;color:#00d49a;letter-spacing:4px;text-align:center;padding:12px 0 8px;min-height:70px;line-height:1;">—</div>
  <div class="matrix-wrap">
    <div class="matrix-grid" id="matrix-grid"></div>
  </div>
  <button class="matrix-cancel" onclick="closeMatrix(null)">Cancel</button>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-title">CPG Ledger</div><div class="topbar-sub" id="topbar-sub"></div></div>
    <div class="topbar-stats">
      <div class="ts"><div class="ts-l">H</div><div class="ts-v hi" id="st-h">0</div></div>
      <div class="ts"><div class="ts-l">VPIP</div><div class="ts-v" id="st-v">—</div></div>
      <div class="ts"><div class="ts-l">PFR</div><div class="ts-v" id="st-p">—</div></div>
      <div class="ts"><div class="ts-l">CPG</div><div class="ts-v" id="st-c">—</div></div>
      <button class="end-btn" onclick="showExport()">END</button>
    </div>
  </div>
  <div class="ledger" id="ledger"></div>

</div>

<!-- EXPORT -->
<div id="export">
  <div class="exp-top"><b>SESSION SUMMARY</b><div style="display:flex;gap:8px;"><button class="back-btn" onclick="showMain()">← Back</button><button class="back-btn" style="border-color:var(--red2);color:var(--red);" onclick="newSession()">New Session</button></div></div>
  <pre class="exp-text" id="exp-text"></pre>
  <button class="copy-btn" id="copy-btn" onclick="doCopy()">Copy to Clipboard</button>
</div>

const LS_KEY='cpg_ledger_session';

function saveSession(){
  try{
    const data={
      hands:hands,
      S:{
        size:S.size,heroSeat:S.heroSeat,pos:S.pos,
        lastStack:S.lastStack,bomb:S.bomb,
        start:S.start.toISOString(),
      },
      activeNewId:activeNewId,
      savedAt:new Date().toISOString()
    };
    // Restore ts fields (Date objects don't serialize)
    data.hands=hands.map(h=>({
      ...h,
      ts:h.ts?h.ts.toISOString():null
    }));
    localStorage.setItem(LS_KEY,JSON.stringify(data));
  } catch(e){ console.warn('Save failed',e); }
}

    }));
    S.size=data.S.size||8;
    S.heroSeat=data.S.heroSeat||1;
    S.pos=data.S.pos||3;
    S.lastStack=data.S.lastStack||null;
    S.start=data.S.start?new Date(data.S.start):new Date();
    activeNewId=data.activeNewId||null;
    _uid=hands.reduce((max,h)=>Math.max(max,h.id||0),0)+1;
    return true;
  } catch(e){ console.warn('Load failed',e); return false; }
}

// \u2500\u2500 TABLE GEOMETRY \u2500\u2500
function getStadiumPoint(t,W,H){
  const R=H/2, straight=W-H, cx=W/2, cy=H/2;
  const lcx=cx-straight/2, rcx=cx+straight/2;
  const semiP=Math.PI*R, total=2*straight+2*semiP;
  let d=((t%1)+1)%1*total;
  const s0=straight/2,s1=semiP,s2=straight,s3=semiP;
  if(d<s0) return{x:cx+(d/s0)*(straight/2),y:cy-R};
  d-=s0; if(d<s1){const a=-Math.PI/2+(d/s1)*Math.PI;return{x:rcx+R*Math.cos(a),y:cy+R*Math.sin(a)};}
  d-=s1; if(d<s2) return{x:rcx-(d/s2)*straight,y:cy+R};
  d-=s2; if(d<s3){const a=Math.PI/2+(d/s3)*Math.PI;return{x:lcx+R*Math.cos(a),y:cy+R*Math.sin(a)};}
  d-=s3; return{x:lcx+(d/(straight/2))*(straight/2),y:cy-R};
}

function getSeatPositions(size,W,H,inset){
  const iW=W-inset*2, iH=H-inset*2;
  const gap=0.10, avail=1-gap*2;
  return Array.from({length:size},(_,i)=>{
    const t=gap+(i+0.5)/size*avail;
    const p=getStadiumPoint(t,iW,iH);
    return{x:p.x+inset,y:p.y+inset,seat:i+1};
  });
}

// \u2500\u2500 RENDER TABLE \u2500\u2500
function renderTable(containerId,size,heroSeat,seatStates,heroStateIdx,buttonSeat,handId,interactive,heroPos){
  const wrap=document.getElementById(containerId);
  if(!wrap)return;
  const W=wrap.clientWidth||300;
  const H=Math.round(W*0.50);
  const inset=30;
  const iW=W-inset*2, iH=H-inset*2;
  const R=iH/2, straight=iW-iH;
  const cx=W/2, cy=H/2;
  const lcx=cx-straight/2, rcx=cx+straight/2;
  const feltPath=`M${cx},${cy-R} L${rcx},${cy-R} A${R},${R} 0 0 1 ${rcx},${cy+R} L${lcx},${cy+R} A${R},${R} 0 0 1 ${lcx},${cy-R} Z`;
  const railR=R+8;
  const railPath=`M${cx},${cy-railR} L${rcx},${cy-railR} A${railR},${railR} 0 0 1 ${rcx},${cy+railR} L${lcx},${cy+railR} A${railR},${railR} 0 0 1 ${lcx},${cy-railR} Z`;

  let html=`<div style="position:relative;height:${H}px;overflow:hidden;">`;
  html+=`<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 ${W} ${H}">
    <path d="${railPath}" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
    <path d="${feltPath}" fill="#111111" stroke="#222222" stroke-width="2"/>
    <text x="${cx}" y="12" text-anchor="middle" fill="#1a1a1a" font-family="Share Tech Mono,monospace" font-size="8" letter-spacing="1">DEALER</text>
    <line x1="${cx-14}" y1="15" x2="${cx+14}" y2="15" stroke="#1a1a1a" stroke-width="1"/>
  </svg>`;

  const seats=getSeatPositions(size,W,H,inset);
  // Seat button size \u2014 scale to available space
  const btnW=Math.max(46,Math.min(58,Math.floor((W-inset*2)/size*1.15)));
  const btnH=42;

  seats.forEach(({x,y,seat})=>{
    const isHero=seat===heroSeat;
    const stIdx=isHero?(heroStateIdx||0):((seatStates&&seatStates[seat])||0);
    const stObj=isHero?HERO_STATES[stIdx]:VIL_STATES[stIdx];
    const hasMark=stIdx>0;
    const heroClass=isHero?'hero':'';
    const stClass=hasMark?stObj.cls:'';
    const clickAttr=interactive
      ?(isHero?`onclick="cycleHero(${handId})"`:`onclick="cycleSeat(${handId},${seat})"`)
      :`onclick="setupPickSeat(${seat})"`;

    // Show position name in interactive mode, seat number in setup mode
    const posLabel=interactive
      ? (seatPosName(seat,heroSeat,heroPos||3,size)||('S'+seat))
      : 'S'+seat;
    // Contextual action label
    function ctxLabel(state, isHeroSeat){
      if(state===0) return '';
      if(isHeroSeat){
        // Hero: 1=fold,2=raise,3=call,4=vpip \u2014 hero always assumed opener
        if(state===1) return 'Fold';
        if(state===2) return 'Raise';
        if(state===3) return 'Call';
        if(state===4) return 'VPIP';
      } else {
        // Villain: 1=call/limp, 2=raise, 3=vpip
        // Convert seat number to CPG position number for preflop action order
        // Higher CPG number = acts earlier (UTG=9 acts before MP=7 etc.)
        function seatCPG(s){
          const ps=getTablePositions();
          const hi=ps.indexOf(heroPos||3);
          if(hi<0) return 0;
          const offset=((s-heroSeat)+size)%size;
          return ps[(hi+offset)%ps.length]||0;
        }
        // Seats that acted before this one = higher CPG number (earlier in preflop order)
        const myCPG=seatCPG(seat);
        const raisesBefore=Object.entries(seatStates||{}).filter(([s,v])=>v===2&&seatCPG(parseInt(s))>myCPG).length;
        const callsBefore=Object.entries(seatStates||{}).filter(([s,v])=>v===1&&seatCPG(parseInt(s))>myCPG).length;
        if(state===1){
          if(raisesBefore>0) return callsBefore>0?'Overcall':'Call';
          return callsBefore>0?'Overlimp':'Limp';
        }
        if(state===2){
          // Sort R seats by CPG descending (earlier actors first)
          const raiseSeatsByCPG=Object.entries(seatStates||{}).filter(([s,v])=>v===2).map(([s])=>parseInt(s)).sort((a,b)=>seatCPG(b)-seatCPG(a));
          const myRaiseRank=raiseSeatsByCPG.indexOf(seat)+1;
          if(myRaiseRank<=1) return 'Raise';
          if(myRaiseRank===2) return '3-Bet';
          if(myRaiseRank===3) return '4-Bet';
          return '5-Bet';
        }
        if(state===3) return 'VPIP';
      }
      return '';
    }
    const actionLabel=hasMark?ctxLabel(stIdx,isHero):'';
    let inner=`<div class="snum">${posLabel}</div>`;
    if(hasMark) inner+=`<div class="sact">${actionLabel}</div>`;

    html+=`<div class="seat-btn ${heroClass} ${stClass}" style="left:${x.toFixed(1)}px;top:${y.toFixed(1)}px;width:${btnW}px;height:${btnH}px;" ${clickAttr}>${inner}</div>`;
  });

  // Dealer puck + SB/BB blind chips
  const _ps=getTablePositions();
  function _seatFor(targetCPG,fromCPG,fromSeat){
    const fi=_ps.indexOf(fromCPG),ti=_ps.indexOf(targetCPG);
    if(fi<0||ti<0)return null;
    let off=ti-fi; if(off<0)off+=_ps.length;
    return((fromSeat-1+off)%size)+1;
  }
  const _hpos=heroPos||3;
  const _sbSeat=_seatFor(2,_hpos,heroSeat);
  const _bbSeat=_seatFor(1,_hpos,heroSeat);

  if(buttonSeat){
    const s=seats.find(s=>s.seat===buttonSeat);
    if(s){
      const bx=s.x+(cx-s.x)*0.30, by=s.y+(cy-s.y)*0.30;
      html+=`<div class="dealer-btn" style="left:${bx.toFixed(1)}px;top:${by.toFixed(1)}px;"><span>D</span></div>`;
    }
  }
  if(_sbSeat){
    const s=seats.find(s=>s.seat===_sbSeat);
    if(s){
      const sx=s.x+(cx-s.x)*0.30, sy=s.y+(cy-s.y)*0.30;
      html+=`<div class="blind-chip" style="left:${sx.toFixed(1)}px;top:${sy.toFixed(1)}px;background:#5080a0;border:1.5px solid #306080;"></div>`;
    }
  }
  if(_bbSeat){
    const s=seats.find(s=>s.seat===_bbSeat);
    if(s){
      const bx2=s.x+(cx-s.x)*0.30, by2=s.y+(cy-s.y)*0.30;
      html+=`<div class="blind-chip" style="left:${(bx2+3).toFixed(1)}px;top:${(by2-3).toFixed(1)}px;background:#406080;border:1.5px solid #204060;"></div>`;
      html+=`<div class="blind-chip" style="left:${(bx2-3).toFixed(1)}px;top:${(by2+3).toFixed(1)}px;background:#5080a0;border:1.5px solid #3060a0;"></div>`;
    }
  }
  html+='</div>';
  wrap.innerHTML=html;
}

// \u2500\u2500 SEAT CYCLE \u2500\u2500
function cycleHero(handId){
  const h=getHand(handId);if(!h)return;
  const cur=h.heroState||0;
  const raiseOnTable=h.seatStates&&Object.values(h.seatStates).some(v=>v===2);
  // HERO_STATES: 0=empty,1=fold,2=raise,3=call,4=vpip
  // No raise: empty->fold->raise->call->vpip->empty
  // Raise exists: empty->fold->call->raise->vpip->empty
  let next;
  if(raiseOnTable){
    const raisedCycle=[0,1,3,2,4]; // fold,call,raise,vpip
    const ci=raisedCycle.indexOf(cur);
    next=raisedCycle[(ci<0?0:ci+1)%raisedCycle.length];
  } else {
    next=(cur+1)%HERO_STATES.length;
  }
  h.heroState=next;
  h.a1=HERO_ACTION_MAP[next]||null;
  h.complete=isComplete(h);
  if(h.a1) S.pos=nextPos(h.pos);
  redrawTable(handId);
  updateStats();
}

function cycleSeat(handId,seat){
  const h=getHand(handId);if(!h)return;
  if(!h.seatStates)h.seatStates={};
  const cur=h.seatStates[seat]||0;
  const raiseExists=Object.entries(h.seatStates).some(([s,v])=>parseInt(s)!==seat&&v===2);
  let next;
  if(cur===0&&raiseExists){
    next=1;
  } else {
    next=(cur+1)%VIL_STATES.length;
  }
  h.seatStates[seat]=next;
  h.sit=inferSit(h);
  redrawTable(handId);
}

function redrawTable(handId){
  const h=getHand(handId);if(!h)return;
  const wrap=document.getElementById('tbl-'+handId);
  if(wrap)renderTable('tbl-'+handId,S.size,S.heroSeat,h.seatStates||{},h.heroState||0,calcButtonSeat(h),handId,true,h.pos);
  updateStats();
}

function inferSit(h){
  if(!h.seatStates)return'rfi';
  const vals=Object.values(h.seatStates).filter(v=>v>0);
  if(vals.length===0)return'rfi';
  const raises=Object.values(h.seatStates).filter(v=>v===2).length;
  const calls=Object.values(h.seatStates).filter(v=>v===1).length;
  if(raises>=2)return'squeeze';
  if(raises===1&&calls>=1)return'squeeze';
  if(raises===1)return'vs-raise';
  if(calls===1)return'limp1';
  if(calls===2)return'limp2';
  if(calls>=3)return'limp3';
  return'rfi';
}

function calcButtonSeat(h){
  const ps=getTablePositions();
  const heroIdx=ps.indexOf(h.pos), buIdx=ps.indexOf(3);
  let off=buIdx-heroIdx; if(off<0)off+=ps.length;
  return((S.heroSeat-1+off)%S.size)+1;
}
function getTablePositions(){return POS_ORDER.slice(9-S.size);}
function nextPos(pos){const ps=getTablePositions();const i=ps.indexOf(pos);return ps[((i-1)+ps.length)%ps.length];}

// \u2500\u2500 HAND MATRIX \u2500\u2500
// Build once, reuse
let matrixBuilt=false;
function buildMatrix(){
  if(matrixBuilt)return;
  const grid=document.getElementById('matrix-grid');
  grid.innerHTML='';
  for(let r=0;r<13;r++){
    for(let c=0;c<13;c++){
      const r1=RANKS[r],r2=RANKS[c];
      let hand;
      if(r===c) hand=r1+r2;
      else if(r<c) hand=r1+r2+'s'; // suited: upper right
      else hand=r2+r1+'o';          // offsuit: lower left
      const el=document.createElement('div');
      el.className='mc';
      el.dataset.hand=hand;
      el.dataset.r=r; el.dataset.c=c;
      el.textContent=hand;
      grid.appendChild(el);
    }
  }
  matrixBuilt=true;
  sizeCells();
}

function sizeCells(){
  const grid=document.getElementById('matrix-grid');
  if(!grid)return;
  const gw=Math.min(window.innerWidth-16, 500);
  const cellSize=Math.floor((gw-16-24)/13); // 16 wrap padding, 24 gaps
  grid.style.width=gw+'px';
  grid.querySelectorAll('.mc').forEach(el=>{
    el.style.height=cellSize+'px';
    el.style.fontSize=Math.max(7,cellSize-10)+'px';
  });
}

function openMatrix(handId){
  buildMatrix();
  sizeCells();
  matrixHandId=handId;
  matrixHoveredCell=null;
  document.querySelectorAll('.mc.sel').forEach(el=>el.classList.remove('sel'));
  const h=getHand(handId);
  const live=document.getElementById('matrix-live-display');
  if(h&&h.hand){
    const cur=document.querySelector(`.mc[data-hand="${h.hand}"]`);
    if(cur)cur.classList.add('sel');
    if(live)live.textContent=h.hand;
  } else {
    if(live)live.textContent='\u2014';
  }
  document.getElementById('hand-overlay').classList.add('open');
}

function closeMatrix(hand){
  document.getElementById('hand-overlay').classList.remove('open');
  if(hand!==null&&matrixHandId!==null){
    const h=getHand(matrixHandId);
    if(h){h.hand=hand;h.complete=isComplete(h);}
    renderLedger();
  }
  matrixHandId=null; matrixHoveredCell=null;
}

function cellFromPoint(x,y){
  const els=document.elementsFromPoint(x,y);
  return els.find(el=>el.classList&&el.classList.contains('mc'))||null;
}

function initMatrixGesture(){
  // Track active touch ID \u2014 captured when finger first touches the hand-tap-area
  // Then followed at document level through move and end
  let activeTouchId = null;

  function highlight(cell){
    document.querySelectorAll('.mc.sel').forEach(el=>el.classList.remove('sel'));
    const live = document.getElementById('matrix-live-display');
    if(cell){
      cell.classList.add('sel');
      matrixHoveredCell=cell;
      if(live) live.textContent = cell.dataset.hand;
    } else {
      matrixHoveredCell=null;
      if(live) live.textContent='\u2014';
    }
  }

  function cellFromTouch(touchList){
    // Find our tracked touch
    for(let i=0;i<touchList.length;i++){
      if(activeTouchId===null||touchList[i].identifier===activeTouchId){
        const t=touchList[i];
        return cellFromPoint(t.clientX,t.clientY);
      }
    }
    return null;
  }

  // Document-level listeners \u2014 catch gesture continuation regardless of origin element
  document.addEventListener('touchmove',e=>{
    if(!document.getElementById('hand-overlay').classList.contains('open'))return;
    if(activeTouchId===null)return;
    const cell=cellFromTouch(e.touches);
    highlight(cell);
    e.preventDefault();
  },{passive:false});

  document.addEventListener('touchend',e=>{
    if(!document.getElementById('hand-overlay').classList.contains('open'))return;
    // Check if our tracked finger lifted
    let ourTouch=null;
    for(let i=0;i<e.changedTouches.length;i++){
      if(activeTouchId===null||e.changedTouches[i].identifier===activeTouchId){
        ourTouch=e.changedTouches[i]; break;
      }
    }
    if(!ourTouch)return;
    activeTouchId=null;
    const cell=matrixHoveredCell||cellFromPoint(ourTouch.clientX,ourTouch.clientY);
    closeMatrix(cell?cell.dataset.hand:null);
    e.preventDefault();
  },{passive:false});

  // Mouse fallback
  let mouseDown=false;
  document.addEventListener('mousedown',e=>{
    if(!document.getElementById('hand-overlay').classList.contains('open'))return;
    mouseDown=true;
    highlight(cellFromPoint(e.clientX,e.clientY));
  });
  document.addEventListener('mousemove',e=>{
    if(!mouseDown||!document.getElementById('hand-overlay').classList.contains('open'))return;
    highlight(cellFromPoint(e.clientX,e.clientY));
  });
  document.addEventListener('mouseup',e=>{
    if(!mouseDown)return;
    mouseDown=false;
    if(!document.getElementById('hand-overlay').classList.contains('open'))return;
    const cell=matrixHoveredCell||cellFromPoint(e.clientX,e.clientY);
    if(cell)closeMatrix(cell.dataset.hand);
  });

  // Direct tap fallback (no drag)
  document.getElementById('matrix-grid').addEventListener('click',e=>{
    const cell=e.target.closest('.mc');
    if(cell)closeMatrix(cell.dataset.hand);
  });

  // Expose activeTouchId setter for bindHandTapArea
  window._matrixSetTouchId = (id) => { activeTouchId = id; };
}

function bindHandTapArea(el,handId){
  el.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    // Capture touch ID before opening matrix
    window._matrixSetTouchId && window._matrixSetTouchId(t.identifier);
    openMatrix(handId);
    // Immediately highlight whatever cell is under the finger
    const live = document.getElementById('matrix-live-display');
    const cell=cellFromPoint(t.clientX,t.clientY);
    document.querySelectorAll('.mc.sel').forEach(x=>x.classList.remove('sel'));
    if(cell){
      cell.classList.add('sel');
      matrixHoveredCell=cell;
      if(live) live.textContent=cell.dataset.hand;
    } else {
      matrixHoveredCell=null;
      if(live) live.textContent='\u2014';
    }
    e.preventDefault();
  },{passive:false});
  // Also support tap (click) on desktop
  el.addEventListener('click',e=>{
    openMatrix(handId);
  });
}

function posMatch(heroPos,cpgPosName){
  if(!cpgPosName)return false;
  const name=POS_NAME[heroPos]||'';
  const alias=name==='BU'?'BTN':(name==='BTN'?'BU':'');
  if(cpgPosName===name||cpgPosName===alias)return true;
  return cpgPosName.split('/').some(p=>p===name||(alias&&p===alias));
}
function effectiveAction(h){
  if(h.a1==='call'&&h.sit&&h.sit.startsWith('limp'))return 'overlimp';
  return h.a1;
}

function cpgLookup(h){
  if(!h.hand||!h.a1||!h.pos||h.straddle)return null;
  let sit=h.sit||'rfi';
  // Option A: if hero raised (heroState===2) and villain raises exist,
  // assume hero opened first \u2014 treat villain raises as re-raises against hero
  const heroIsRaiser=h.heroState===2;
  const vilRaiseCount=h.seatStates?Object.values(h.seatStates).filter(v=>v===2).length:0;
  if(heroIsRaiser&&vilRaiseCount>=1){
    // Hero opened, facing re-raise(s)
    sit=vilRaiseCount===1?'facing-3bet':'facing-4bet';
  }
  let sc=[];
  if(sit==='rfi')sc=['RFI'];
  else if(sit.startsWith('limp'))sc=['ISO & Overlimp vs Limps'];
  else if(sit==='vs-raise')sc=['BB Defense vs Reg 2B','3B vs Reg 2B','Defense vs Reg 3B'];
  else if(sit==='squeeze')sc=['Defense vs Reg Squeeze as PFR','Defense vs Reg Squeeze as PFR OOP'];
  else if(sit==='facing-3bet')sc=['Defense vs Reg 3B','Defense vs Reg 3B IP','Defense vs Reg 3B OOP'];
  else if(sit==='facing-4bet')sc=['Defense vs Reg 4B','IP Call Range vs Reg 5B'];
  else sc=['RFI'];
  const na=h.a1==='rfi'?'raise':h.a1;
  const lp=sit==='limp1'?'1':sit==='limp2'?'2':sit==='limp3'?'3':'';
  for(const s of sc)for(const row of CPG_RAW){
    const[rS,rH,,,,rHand,rA,rN]=row;
    if(rS!==s||rHand!==h.hand)continue;
    if(!posMatch(h.pos,rH))continue;
    if(lp&&row[4]&&row[4]!==lp)continue;
    return{cpgAction:rA,heroAction:na,notes:rN};
  }
  return null;
}
function cpgIcon(h){
  const r=cpgLookup(h);
  if(!r)return'<span style="color:var(--text3);font-size:11px">\u2014</span>';
  const na=effectiveAction(h)==='rfi'?'raise':effectiveAction(h);
  return(r.cpgAction===na||(r.cpgAction==='no call'&&na!=='call'))?'✅':'⚠️';
}
function cpgBarHTML(h){
  const r=cpgLookup(h);if(!r)return'';
  const na=effectiveAction(h)==='rfi'?'raise':effectiveAction(h);
  const AL={fold:'Fold',raise:'Raise/RFI',call:'Call','3bet':'3-Bet','4bet':'4-Bet','5bet':'5-Bet',overlimp:'Overlimp'};
  if(r.cpgAction===na||(r.cpgAction==='no call'&&na!=='call'))
    return`<div class="cpg-bar cpg-ok">\u2705 CPG: ${AL[r.cpgAction]||r.cpgAction}</div>`;
  return`<div class="cpg-bar cpg-dev">\u26a0\ufe0f CPG: ${AL[r.cpgAction]||r.cpgAction}${r.notes?' ('+r.notes+')':''}</div>`;
}

// \u2500\u2500 RENDER LEDGER \u2500\u2500
function seatPosName(seat, heroSeat, heroPos, size){
  // Convert physical seat number to position name
  const ps=getTablePositions();
  const hi=ps.indexOf(heroPos);
  if(hi<0) return 'S'+seat;
  const offset=((seat-heroSeat)+size)%size;
  const pi=((hi+offset)%ps.length);
  return displayPosName(ps[pi],size)||('S'+seat);
}

function buildActionLabel(h){
  const AL={raise:'RAISE',call:'CALL',fold:'FOLD',vpip:'VPIP',overlimp:'OVERLIMP'};
  const effA=effectiveAction(h);
  const vilRaises=h.seatStates?Object.values(h.seatStates).filter(v=>v===2).length:0;
  const heroIsRaiserCtx=h.heroState===2;
  // If hero opened (Option A assumption), label stays RAISE regardless of villain re-raises
  // If hero is cold-raising into villain raises, label reflects raise count
  const heroRaiseLabel=heroIsRaiserCtx?'RAISE':(vilRaises===0?'RAISE':vilRaises===1?'3BET':vilRaises===2?'4BET':'5BET');
  const heroLabel=effA==='raise'?heroRaiseLabel:(AL[effA]||effA||'--');
  const heroIn=['raise','call','vpip','overlimp'].includes(effA);
  if(!h.seatStates||Object.keys(h.seatStates).length===0){
    if(heroIn) return heroLabel+' \u00b7 heads up';
    return heroLabel;
  }
  const size=S.size, heroSeat=S.heroSeat, heroPos=h.pos;
  const raisers=[], callers=[], vpips=[];
  Object.entries(h.seatStates).forEach(([seat,state])=>{
    const posName=seatPosName(parseInt(seat),heroSeat,heroPos,size);
    if(state===1) callers.push(posName); // limp or call \u2014 context determines label
    else if(state===2) raisers.push(posName);
    else if(state===3) vpips.push(posName);
  });
  const hasVilRaise=h.seatStates?Object.values(h.seatStates).some(v=>v===2):false;
  const parts=[];
  if(!hasVilRaise){
    if(callers.length===1) parts.push(callers[0]+' limp');
    else if(callers.length>1) parts.push(callers.length+' limpers');
  } else {
    if(raisers.length===1) parts.push(raisers[0]+' raise');
    else if(raisers.length>1) parts.push(raisers.length+' raises');
    if(callers.length===1) parts.push(callers[0]+' call');
    else if(callers.length>1) parts.push(callers.length+' callers');
  }
  if(vpips.length>0) parts.push(vpips.length+' VPIP');
  parts.push(heroLabel);
  // Players postflop count (only if hero is in the pot)
  if(heroIn){
    // Count: villains who called or raised + hero
    const villainCount=Object.values(h.seatStates).filter(v=>v===2||v===3||v===4).length;
    const total=villainCount+1; // +1 for hero
    if(total===2) parts.push('\u00b7 heads up');
    else if(total>=3) parts.push('\u00b7 '+total+'-way');
  }
  return parts.join(', ').replace(', \u00b7','  \u00b7');
}

          </div>

        }

    } else {
      html+=`<div class="hand-row" style="opacity:.65"><div class="row-summary" style="cursor:default">

  if(hands.length===0){

  }
  html+='<div class="add-hand-row"><button class="add-hand-btn" onclick="addNewHand()">+ HAND</button></div>';

  el.innerHTML=html;
  saveSession();

  requestAnimationFrame(()=>{

        if(hta)bindHandTapArea(hta,h.id);
      }
    });
  });
}

// \u2500\u2500 INTERACTIONS \u2500\u2500
function addNewHand(){
  hands.forEach(x=>x.expanded=false);
  if(activeNewId!==null){
    const prev=getHand(activeNewId);
    if(prev){
      prev.complete=isComplete(prev);
      if(!prev.a1) S.pos=nextPos(prev.pos);
      if(prev.stack!==null) S.lastStack=prev.stack;
    }
  }
  activeNewId=null;
  const h=makeHand(); activeNewId=h.id;
  hands.unshift(h); renderLedger();
  setTimeout(()=>{const l=document.getElementById('ledger');if(l)l.scrollTop=l.scrollHeight;},80);
}
function movePos(id,d){
  const h=getHand(id);if(!h)return;
  const ps=getTablePositions();
  const i=ps.indexOf(h.pos);
  h.pos=ps[((i+d)+ps.length)%ps.length];
  const pn=document.getElementById('pn-'+id); if(pn)pn.textContent=displayPosName(h.pos,S.size)||'?';
  const pc=document.getElementById('pc-'+id); if(pc)pc.textContent='POS '+h.pos;
  requestAnimationFrame(()=>{const w=document.getElementById('tbl-'+id);if(w)renderTable('tbl-'+id,S.size,S.heroSeat,h.seatStates||{},h.heroState||0,calcButtonSeat(h),id,true,h.pos);});
}
function toggleExpand(id){
  const h=getHand(id);if(!h)return;
  const was=h.expanded;
  hands.forEach(x=>{if(x.id!==id)x.expanded=false;});
  h.expanded=!was;
  renderLedger();
  if(h.expanded)setTimeout(()=>{const el=document.querySelector('[data-hid="'+id+'"]')||document.getElementById('nc-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}
function clearHand(id){const h=getHand(id);if(!h)return;h.hand=null;h.complete=false;renderLedger();}
function toggleStraddle(id){const h=getHand(id);if(!h)return;h.straddle=!h.straddle;renderLedger();}
function toggleOpt(id,f,autoFocus){

  if(autoFocus&&h[f]){

function updateStack(id,v){const h=getHand(id);if(!h)return;h.stack=v===''?null:parseFloat(v)||null;if(h.stack!==null)S.lastStack=h.stack;}
function updateNotes(id,v){const h=getHand(id);if(!h)return;h.notes=v;const r=document.querySelector('[data-hid="'+id+'"]');if(r)r.classList.toggle('noted',!!v);}
function quickLog(type){

// \u2500\u2500 STATS \u2500\u2500
function updateStats(){
  const nh=hands.filter(h=>h.type==='normal'),ms=hands.filter(h=>h.type==='missed');
  const total=nh.length+ms.length;
  const vpip=nh.filter(h=>['call','raise','3bet','4bet','5bet','overlimp'].includes(h.a1)).length;
  const pfr=nh.filter(h=>['raise','3bet','4bet','5bet'].includes(h.a1)).length;
  const fr=nh.filter(h=>['vs-raise','squeeze'].includes(h.sit));
  const tb=fr.filter(h=>h.a1==='3bet').length;
  let ct=0,cm=0;
  nh.forEach(h=>{const r=cpgLookup(h);if(!r)return;ct++;const na=effectiveAction(h)==='rfi'?'raise':effectiveAction(h);if(r.cpgAction===na||(r.cpgAction==='no call'&&na!=='call'))cm++;});
  document.getElementById('st-h').textContent=total||'0';
  document.getElementById('st-v').textContent=total>0?Math.round(vpip/total*100)+'%':'\u2014';
  document.getElementById('st-p').textContent=total>0?Math.round(pfr/total*100)+'%':'\u2014';
  // 3B% in export only
  document.getElementById('st-c').textContent=ct>0?cm+'/'+ct:'\u2014';
}

function genExport(){
  const now=new Date(),dur=Math.round((now-S.start)/60000);
  const nh=hands.filter(h=>h.type==='normal'),ms=hands.filter(h=>h.type==='missed');
  const total=nh.length+ms.length;
  const vpip=nh.filter(h=>['call','raise','3bet','4bet','5bet','overlimp'].includes(h.a1));
  const pfr=nh.filter(h=>['raise','3bet','4bet','5bet'].includes(h.a1));
  const fr=nh.filter(h=>['vs-raise','squeeze'].includes(h.sit));
  const tb=fr.filter(h=>h.a1==='3bet');
  const f3=nh.filter(h=>h.a1==='raise'&&h.a2==='fold');
  let ct=0,cm=0,devs=[];
  nh.forEach(h=>{const r=cpgLookup(h);if(!r)return;ct++;const na=effectiveAction(h)==='rfi'?'raise':effectiveAction(h);if(r.cpgAction===na||(r.cpgAction==='no call'&&na!=='call'))cm++;else devs.push({h,r});});

  // Starting and ending stack
  const handsAsc=[...nh].reverse();
  const firstStack=handsAsc.find(h=>h.stack!==null);
  const lastStack=[...handsAsc].reverse().find(h=>h.stack!==null);
  const netStr=firstStack&&lastStack&&firstStack!==lastStack
    ?' (net: '+(lastStack.stack-firstStack.stack>=0?'+':'')+(lastStack.stack-firstStack.stack)+')'
    :'';

  let L=['CPG PREFLOP LEDGER \u2014 SESSION EXPORT','=====================================',
    'Date: '+S.start.toLocaleDateString(),
    'Seat: '+S.heroSeat+' / '+S.size+'-handed',
    'Duration: '+dur+' min',
    firstStack?'Stack: $'+firstStack.stack+(lastStack&&lastStack!==firstStack?' -> $'+lastStack.stack+netStr:''):'',
    '',
    'STATS',
    '  Hands:  '+total+' ('+nh.length+' logged, '+ms.length+' sit-outs)',
    '  VPIP:   '+(total>0?Math.round(vpip.length/total*100)+'%':'--')+' ('+vpip.length+'/'+total+')',
    '  PFR:    '+(total>0?Math.round(pfr.length/total*100)+'%':'--')+' ('+pfr.length+'/'+total+')',
    '  3B%:    '+(fr.length>0?Math.round(tb.length/fr.length*100)+'%':'--')+' ('+tb.length+'/'+fr.length+')',
    '  CPG:    '+cm+'/'+ct+(ct>0?' ('+Math.round(cm/ct*100)+'%)':''),
    ''];

  // Deviations
  if(devs.length>0){
    L.push('DEVIATIONS');
    devs.forEach(({h,r})=>{
      const num=[...hands].reverse().indexOf(h)+1;
      const pos=displayPosName(h.pos,S.size)||'?';
      const al=buildActionLabel(h)||'--';
      const AL2={fold:'Fold',raise:'Raise',call:'Call','3bet':'3-Bet','4bet':'4-Bet','5bet':'5-Bet',overlimp:'Overlimp'};
      L.push('  #'+num+' '+pos+' '+(h.hand||'?')+'  '+al+'  -> CPG: '+(AL2[r.cpgAction]||r.cpgAction)+(r.notes?' ('+r.notes+')':''));
    });
    L.push('');
  }

  // Full ledger \u2014 natural language format
  L.push('FULL LEDGER');
  L.push('-----------');
  let runningStack=null;
  const POS_VERB={raise:'raises',call:'calls',fold:'folds',vpip:'plays',overlimp:'overlimps'};
  const VIL_VERB={1:'limps',2:'raises',3:'calls'};
  handsAsc.forEach((h,i)=>{
    const num=i+1;
    if(h.type==='missed'){L.push('#'+num+'  SIT OUT');return;}
    if(h.type!=='normal')return;
    if(h.stack!==null) runningStack=h.stack;
    const pos=displayPosName(h.pos,S.size)||'?';
    const hnd=h.hand||null;
    const effA=effectiveAction(h);
    const ts=h.ts?h.ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    const r=cpgLookup(h);
    // Build villain action phrases in CPG position order (higher = earlier)
    let vilParts=[];
    if(h.seatStates&&Object.keys(h.seatStates).length>0){
      // Sort by CPG position descending (acts earlier first)
      const sortedSeats=Object.entries(h.seatStates)
        .filter(([s,v])=>v>0)
        .sort(([a],[b])=>{
          const ps=getTablePositions();
          const hi=ps.indexOf(h.pos||3);
          function cpgOf(seat){
            const off=((parseInt(seat)-S.heroSeat)+S.size)%S.size;
            return ps[(hi+off)%ps.length]||0;
          }
          return cpgOf(parseInt(b))-cpgOf(parseInt(a));
        });
      sortedSeats.forEach(([seat,state])=>{
        const vpos=seatPosName(parseInt(seat),S.heroSeat,h.pos,S.size);
        const verb=VIL_VERB[state]||'acts';
        vilParts.push(vpos+' '+verb);
      });
    }
    // Hero phrase
    const heroVerb=POS_VERB[effA]||effA||'acts';
    const handStr=hnd?' with '+hnd:'';
    const heroPart='Hero '+pos+' '+heroVerb+handStr;
    // Combine
    const allParts=[...vilParts,heroPart];
    let line='#'+num+'  '+allParts.join(', ')+'.';
    if(runningStack!==null) line+=' $'+runningStack+'.';
    // CPG
    if(r){
      const na=effA==='rfi'?'raise':effA;
      const AL2={fold:'Fold',raise:'Raise',call:'Call','3bet':'3-Bet','4bet':'4-Bet','5bet':'5-Bet',overlimp:'Overlimp'};
      const cpgOk=r.cpgAction===na||(r.cpgAction==='no call'&&na!=='call');
      line+=cpgOk?' [OK]':' [CPG: '+(AL2[r.cpgAction]||r.cpgAction)+(r.notes?' - '+r.notes:'')+']';
    }
    if(ts) line+=' ('+ts+')';
    if(h.notes) line+='  NOTE: '+h.notes;
    L.push(line);
  });
  return L.join('\n');
}
function doCopy(){
  navigator.clipboard.writeText(document.getElementById('exp-text').textContent).then(()=>{
    const b=document.getElementById('copy-btn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy to Clipboard',2000);
  }).catch(()=>{const el=document.getElementById('exp-text');const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);});
}

window.addEventListener('load',()=>{
  // Try to restore a saved session
  if(loadSession()&&hands.length>0){
    // Restore session info in topbar
    document.getElementById('topbar-sub').textContent='Seat '+S.heroSeat+' \u00b7 '+S.size+'-handed';
    document.getElementById('setup').style.display='none';
    document.getElementById('main').style.display='flex';
    document.getElementById('main').classList.add('active');
    buildMatrix();
    initMatrixGesture();
    renderLedger();
  } else {
    renderSetupTable();
    buildMatrix();
    initMatrixGesture();
  }
});
window.addEventListener('resize',()=>{if(matrixBuilt)sizeCells();});
</script>
